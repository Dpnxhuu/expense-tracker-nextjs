<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="115" fill="#1e2235"/>
  <!-- Inner border ring -->
  <rect x="18" y="18" width="476" height="476" rx="100" fill="none" stroke="#7c6bff" stroke-width="5" opacity="0.35"/>

  <!-- Rupee symbol -->
  <text x="256" y="340" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="300" font-weight="700" fill="#7c6bff">₹</text>

  <!-- Mini bar chart at bottom -->
  <rect x="88"  y="400" width="44" height="58"  rx="10" fill="#7c6bff" opacity="0.45"/>
  <rect x="146" y="380" width="44" height="78"  rx="10" fill="#7c6bff" opacity="0.60"/>
  <rect x="204" y="362" width="44" height="96"  rx="10" fill="#7c6bff" opacity="0.80"/>
  <rect x="262" y="372" width="44" height="86"  rx="10" fill="#7c6bff" opacity="0.65"/>
  <rect x="320" y="385" width="44" height="73"  rx="10" fill="#7c6bff" opacity="0.55"/>
  <rect x="378" y="368" width="44" height="90"  rx="10" fill="#7c6bff" opacity="0.75"/>

  <!-- Overlay to blend bars smoothly with text -->
  <rect x="70" y="350" width="376" height="110" rx="0" fill="#1e2235" opacity="0.55"/>
</svg>